{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 헤더 및 뱃지 영역 -->
    <h3 class="mb-4 fw-bold">스터디박스 모니터링 (A/B/C/MAIN 등급 수신함)</h3>
    <div class="d-flex gap-2 mb-4">
        <span class="badge rounded-pill bg-primary fs-6 py-2 px-3">A등급 <span id="count-A">0</span></span>
        <span class="badge rounded-pill bg-secondary fs-6 py-2 px-3">B등급 <span id="count-B">0</span></span>
        <span class="badge rounded-pill bg-secondary fs-6 py-2 px-3">C등급 <span id="count-C">0</span></span>
        <!-- ✨ 새로 추가된 MAIN 탭 뱃지 -->
        <span class="badge rounded-pill bg-danger fs-6 py-2 px-3">MAIN <span id="count-MAIN">0</span></span>
    </div>

    <!-- 컨트롤 패널 (버튼 영역) -->
    <div class="card shadow-sm mb-4 border-primary">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h6 class="mb-1 text-primary fw-bold">체크박스 다중 선택 및 항목 관리</h6>
                    <small class="text-muted">ⓘ 체크박스를 클릭하고 다른 체크박스를 Shift + 클릭하면 그 사이의 모든 항목이 한 번에 선택됩니다!</small>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <!-- 검색 및 정렬 -->
                    <div class="input-group" style="width: 250px;">
                        <select class="form-select" id="search-type" style="max-width: 100px;">
                            <option value="all">전체 검색</option>
                        </select>
                        <input type="text" class="form-control" id="search-input" placeholder="검색어를 입력하세요...">
                    </div>
                    <select class="form-select" id="sort-type" style="width: 130px;">
                        <option value="recent">최근 등록순</option>
                    </select>

                    <!-- ✨ 탭 이동 버튼 영역 (MAIN 추가됨) -->
                    <div class="btn-group border rounded border-primary p-1">
                        <button class="btn btn-sm btn-outline-primary border-0 fw-bold" onclick="moveGrade('A')">A로 이동</button>
                        <button class="btn btn-sm btn-outline-dark border-0 fw-bold" onclick="moveGrade('B')">B로 이동</button>
                        <button class="btn btn-sm btn-outline-secondary border-0 fw-bold" onclick="moveGrade('C')">C로 이동</button>
                        <button class="btn btn-sm btn-outline-danger border-0 fw-bold" onclick="moveGrade('MAIN')">MAIN 이동</button>
                    </div>

                    <!-- 기능 버튼들 -->
                    <button class="btn btn-sm btn-outline-warning text-dark fw-bold border-2" onclick="clearData()">◇ 데이터 초기화</button>
                    <button class="btn btn-sm btn-dark fw-bold" onclick="downloadExcel()">☒ 엑셀 다운로드</button>
                    <button class="btn btn-sm btn-success fw-bold" onclick="refreshIsbn()">[ ] 선택 항목 ISBN 업데이트</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 데이터 테이블 -->
    <div class="table-responsive bg-white shadow-sm rounded border">
        <table class="table table-bordered table-hover align-middle text-center mb-0" id="dataTable" style="font-size: 0.9rem;">
            <thead class="table-light align-middle">
                <tr>
                    <th style="width: 40px;"><input class="form-check-input" type="checkbox" id="selectAll"></th>
                    <th style="width: 60px;">순번</th>
                    <th style="width: 15%;">키워드</th>
                    <th style="width: 80px;">네이버카운트</th>
                    <th style="width: 100px;">스터디박스 순위</th>
                    <th style="width: 90px;">키워드링크</th>
                    <th style="width: 90px;">상품링크</th>
                    <th style="width: 10%;">출판사명</th>
                    <th style="width: 70px;">공급률</th>
                    <th style="width: 120px;">ISBN</th>
                    <th style="width: 90px;">가격</th>
                    <th style="width: 80px;">택배비</th>
                    <th style="width: 15%;">상점 책제목</th>
                    <th style="width: 60px;">저장</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- JavaScript 렌더링 영역 -->
            </tbody>
        </table>
    </div>
</div>

<!-- 스크립트 영역 -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    let tableData = [];
    let lastChecked = null;

    $(document).ready(function() {
        loadData();

        // Shift + 클릭 다중 선택 로직
        $(document).on('click', '.row-checkbox', function(e) {
            if (!lastChecked) {
                lastChecked = this;
                return;
            }
            if (e.shiftKey) {
                let start = $('.row-checkbox').index(this);
                let end = $('.row-checkbox').index(lastChecked);
                $('.row-checkbox').slice(Math.min(start, end), Math.max(start, end) + 1).prop('checked', lastChecked.checked);
            }
            lastChecked = this;
        });

        $('#selectAll').click(function() {
            $('.row-checkbox').prop('checked', this.checked);
        });
    });

    function loadData() {
        $.get('/monitoring/api/saved_keywords', function(res) {
            if (res.success) {
                tableData = res.data;
                renderTable(tableData);
                updateBadges(tableData);
            }
        });
    }

    function updateBadges(data) {
        let counts = { 'A': 0, 'B': 0, 'C': 0, 'MAIN': 0 };
        data.forEach(item => {
            if (counts[item.grade] !== undefined) counts[item.grade]++;
        });
        $('#count-A').text(counts['A']);
        $('#count-B').text(counts['B']);
        $('#count-C').text(counts['C']);
        $('#count-MAIN').text(counts['MAIN']);
    }

    function renderTable(data) {
        const tbody = $('#tableBody');
        tbody.empty();
        data.forEach(item => {
            // 등급별 형광펜 효과 (A등급 초록색, MAIN등급 붉은색)
            let bgColor = '';
            if (item.grade === 'A') bgColor = 'background-color: #00ff00; font-weight: bold;';
            else if (item.grade === 'MAIN') bgColor = 'background-color: #ffcccc; font-weight: bold; color: #cc0000;';
            
            let tr = `
                <tr data-id="${item.id}">
                    <td><input class="form-check-input row-checkbox" type="checkbox" value="${item.id}"></td>
                    <td>${item.id}</td>
                    <td style="${bgColor}">${item.keyword}</td>
                    <td class="fw-bold">${item.search_volume.toLocaleString()}</td>
                    <td class="fw-bold text-success">${item.store_rank}</td>
                    <td><a href="https://search.shopping.naver.com/search/all?query=${encodeURIComponent(item.keyword)}" target="_blank" class="btn btn-sm btn-light border">🔍 키워드</a></td>
                    <td>${item.product_link !== '-' ? `<a href="${item.product_link}" target="_blank" class="btn btn-sm btn-light border">🔗 상품</a>` : '-'}</td>
                    <td><input type="text" class="form-control form-control-sm pub-input text-center" value="${item.publisher}"></td>
                    <td><input type="text" class="form-control form-control-sm sup-input text-center" value="${item.supply_rate}"></td>
                    <td><input type="text" class="form-control form-control-sm isbn-input text-center fw-bold" value="${item.isbn}"></td>
                    <td class="price-val">${item.price}</td>
                    <td class="shipping-val">${item.shipping_fee}</td>
                    <td class="text-start title-val">${item.book_title}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="saveRow(${item.id})">저장</button></td>
                </tr>
            `;
            tbody.append(tr);
        });
    }

    function saveRow(id) {
        const tr = $(`tr[data-id='${id}']`);
        const data = {
            id: id,
            publisher: tr.find('.pub-input').val(),
            supply_rate: tr.find('.sup-input').val(),
            isbn: tr.find('.isbn-input').val(),
            price: tr.find('.price-val').text().trim(),
            shipping_fee: tr.find('.shipping-val').text().trim(),
            book_title: tr.find('.title-val').text().trim(),
            product_link: tr.find('td:eq(6) a').length ? tr.find('td:eq(6) a').attr('href') : '-'
        };

        $.post('/monitoring/api/update_keyword', data, function(res) {
            if (res.success) {
                alert('✅ 저장되었습니다.');
                loadData();
            } else {
                // ✨ 핵심: ISBN 중복 시 백엔드에서 보낸 에러 메시지를 강력한 경고창으로 띄웁니다!
                alert(res.message);
                loadData(); // 잘못 입력된 ISBN을 원래 상태로 복구
            }
        }).fail(function() {
            alert('🚨 서버 통신 에러가 발생했습니다.');
        });
    }

    function moveGrade(grade) {
        let ids = [];
        $('.row-checkbox:checked').each(function() { ids.push($(this).val()); });
        if (ids.length === 0) return alert('이동할 항목을 선택해주세요.');

        $.post('/monitoring/api/change_grade', { 'ids[]': ids, grade: grade }, function(res) {
            if (res.success) {
                alert(res.message);
                loadData();
            }
        });
    }

    function clearData() {
        let ids = [];
        $('.row-checkbox:checked').each(function() { ids.push($(this).val()); });
        if (ids.length === 0 && !confirm('선택된 항목이 없습니다. 전체 데이터를 초기화하시겠습니까?')) return;
        
        $.post('/monitoring/api/clear_data', { 'ids[]': ids }, function(res) {
            if (res.success) {
                alert(res.message);
                loadData();
            }
        });
    }

    function refreshIsbn() {
        let ids = [];
        $('.row-checkbox:checked').each(function() { ids.push($(this).val()); });
        if (ids.length === 0) return alert('업데이트할 항목을 선택해주세요.');

        $.post('/monitoring/api/refresh_by_isbn', { 'ids[]': ids }, function(res) {
            alert(res.message);
            if (res.success) setTimeout(() => location.reload(), 1500);
        });
    }
</script>
{% endblock %}
