{% extends "base.html" %}
{% block content %}
<h3 class="mb-4 fw-bold">스터디박스 모니터링 (A등급 수신함)</h3>

<div class="row">
    <div class="col-12">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 class="fw-bold mb-1 text-dark">키워드 및 스터디박스 상점 순위 현황</h6>
                        <span class="text-muted small">
                            <i class="bi bi-broadcast text-primary"></i> 
                            다른 탭(도서 분석기)에서 분석을 돌려놓고 이 창을 켜두시면 A등급이 자동으로 들어옵니다.
                        </span>
                    </div>
                    <button class="btn btn-primary fw-bold shadow-sm" onclick="alert('Pro 연동 준비 중입니다.')">
                        수동 업데이트 및 Pro 연동
                    </button>
                </div>
                
                <div class="table-responsive border rounded" style="max-height: 600px; overflow-y: auto;">
                    <table class="table table-bordered text-center align-middle mb-0" style="font-size: 0.85rem; white-space: nowrap;">
                        <thead class="table-light text-muted" style="position: sticky; top: 0; z-index: 1;">
                            <tr>
                                <th>순번</th>
                                <th>키워드</th>
                                <th>네이버카운트</th>
                                <th>스터디박스 순위</th>
                                <th>키워드링크</th>
                                <th>상품링크</th>
                                <th>출판사명</th>
                                <th>공급률</th>
                                <th>ISBN</th>
                                <th>가격</th>
                                <th>택배비</th>
                                <th>상점 책제목</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="savedKeywordsBody">
                            <tr><td colspan="13" class="text-center py-5 text-muted">데이터를 기다리는 중입니다...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-neon-green {
        background-color: #00ff00 !important;
        color: #000 !important;
        font-weight: 800;
    }
    .edit-input { 
        min-width: 70px; 
        max-width: 150px; 
        text-align: center;
    }
</style>

<script>
    let isEditing = false; 

    async function loadSavedKeywords() {
        if (isEditing) return; 

        const tbody = document.getElementById('savedKeywordsBody');
        try {
            const res = await fetch("{{ url_for('monitoring.get_saved_keywords') }}");
            const result = await res.json();
            
            if (result.success && result.data.length > 0) {
                tbody.innerHTML = result.data.map((k, index) => {
                    // 사용자가 링크를 입력했으면 클릭 가능한 버튼 생성
                    let linkBtn = '<span class="text-muted">-</span>';
                    if (k.product_link !== '-' && k.product_link !== '') {
                        let finalUrl = k.product_link.startsWith('http') ? k.product_link : 'http://' + k.product_link;
                        linkBtn = `<a href="${finalUrl}" target="_blank" class="btn btn-sm btn-outline-primary py-0 px-2 text-decoration-none"><i class="bi bi-link-45deg"></i> 상품</a>`;
                    }

                    return `
                    <tr>
                        <td class="align-middle">${index + 1}</td>
                        <td class="align-middle bg-neon-green">${k.keyword}</td>
                        <td class="align-middle bg-neon-green">업데이트됨<br><span class="small fw-normal">(${k.search_volume.toLocaleString()})</span></td>
                        
                        <td class="align-middle bg-neon-green fw-bold text-dark" id="rank_${k.id}" data-val="${k.store_rank}">${k.store_rank}</td>
                        
                        <td class="align-middle"><a href="${k.link}" target="_blank" class="btn btn-sm btn-outline-secondary py-0 px-2 text-decoration-none"><i class="bi bi-search"></i> 키워드</a></td>
                        
                        <td class="align-middle" id="plink_${k.id}" data-val="${k.product_link}">${linkBtn}</td>
                        
                        <td class="align-middle text-muted" id="pub_${k.id}" data-val="${k.publisher}">${k.publisher}</td>
                        <td class="align-middle text-muted" id="sup_${k.id}" data-val="${k.supply_rate}">${k.supply_rate}</td>
                        <td class="align-middle text-muted fw-bold text-dark" id="isbn_${k.id}" data-val="${k.isbn}">${k.isbn}</td>
                        <td class="align-middle text-muted" id="price_${k.id}" data-val="${k.price}">${k.price}</td>
                        <td class="align-middle fw-bold text-secondary" id="ship_${k.id}" data-val="${k.shipping_fee}">${k.shipping_fee}</td>
                        <td class="align-middle text-muted" id="store_${k.id}" data-val="${k.store_name}">${k.store_name}</td>
                        <td class="align-middle text-muted" id="title_${k.id}" data-val="${k.book_title}">${k.book_title}</td>
                        
                        <td class="align-middle" id="action_${k.id}">
                            <button class="btn btn-sm btn-primary py-0 px-2" onclick="editKeyword(${k.id})" title="수정"><i class="bi bi-pencil-square"></i></button>
                            <button class="btn btn-sm btn-danger py-0 px-2" onclick="deleteKeyword(${k.id})" title="삭제"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                    `;
                }).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="13" class="text-center py-5 text-muted">도서 분석기에서 A등급 키워드가 발견되면 여기에 자동으로 추가됩니다.</td></tr>';
            }
        } catch (e) {
            console.error(e);
        }
    }

    function editKeyword(id) {
        isEditing = true; 
        const fields = ['rank', 'plink', 'pub', 'sup', 'isbn', 'price', 'ship', 'store', 'title'];
        
        fields.forEach(f => {
            const td = document.getElementById(`${f}_${id}`);
            const val = td.getAttribute('data-val'); 
            
            const cleanVal = (val !== '-') ? val : '';
            // 상품링크 칸은 주소가 기니까 조금 더 넓게 표시
            const extraClass = (f === 'plink' || f === 'title') ? 'w-100' : 'edit-input';
            td.innerHTML = `<input type="text" id="in_${f}_${id}" class="form-control form-control-sm px-1 py-0 ${extraClass}" value="${cleanVal}" placeholder="${f==='plink'?'주소입력':''}">`;
        });
        
        const actionTd = document.getElementById(`action_${id}`);
        actionTd.innerHTML = `
            <button class="btn btn-sm btn-success py-0 px-2" onclick="saveKeyword(${id})" title="저장"><i class="bi bi-check-lg"></i></button>
            <button class="btn btn-sm btn-secondary py-0 px-2" onclick="cancelEdit(${id})" title="취소"><i class="bi bi-x-lg"></i></button>
        `;
    }

    function cancelEdit(id) {
        isEditing = false; 
        loadSavedKeywords(); 
    }

    async function saveKeyword(id) {
        const fd = new FormData();
        fd.append('id', id);
        fd.append('store_rank', document.getElementById(`in_rank_${id}`).value || '1');
        fd.append('product_link', document.getElementById(`in_plink_${id}`).value || '-');
        fd.append('publisher', document.getElementById(`in_pub_${id}`).value || '-');
        fd.append('supply_rate', document.getElementById(`in_sup_${id}`).value || '-');
        fd.append('isbn', document.getElementById(`in_isbn_${id}`).value || '-');
        fd.append('price', document.getElementById(`in_price_${id}`).value || '-');
        fd.append('shipping_fee', document.getElementById(`in_ship_${id}`).value || '무료');
        fd.append('store_name', document.getElementById(`in_store_${id}`).value || '-');
        fd.append('book_title', document.getElementById(`in_title_${id}`).value || '-');

        try {
            await fetch("{{ url_for('monitoring.update_keyword') }}", { method: 'POST', body: fd });
            isEditing = false;
            loadSavedKeywords(); 
        } catch(e) {
            alert('저장 중 오류가 발생했습니다.');
        }
    }

    async function deleteKeyword(id) {
        if (!confirm('이 키워드를 완전히 삭제하시겠습니까?')) return;
        const fd = new FormData();
        fd.append('id', id);
        await fetch("{{ url_for('monitoring.delete_keyword') }}", { method: 'POST', body: fd });
        loadSavedKeywords();
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadSavedKeywords();
        setInterval(loadSavedKeywords, 2000);
    });
</script>
{% endblock %}
