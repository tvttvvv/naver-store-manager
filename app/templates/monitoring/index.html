{% extends "base.html" %}
{% block content %}
<h3 class="mb-4 fw-bold">스터디박스 모니터링 (A등급 황금 키워드 추출기)</h3>
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <form id="monitorForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted d-flex justify-content-between align-items-center">
                            <span>분석할 도서 키워드 입력</span>
                            <span class="badge bg-warning text-dark"><i class="bi bi-trophy-fill"></i> A등급 전용</span>
                        </label>
                        <textarea name="keywords" id="keywords" class="form-control" rows="12" placeholder="한 줄에 하나씩 키워드를 입력하세요.&#10;수백 개를 입력해도 황금 키워드만 쏙쏙 뽑아냅니다." required></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-warning w-100 py-3 fw-bold fs-5 shadow-sm text-dark">
                        <i class="bi bi-search me-1"></i> 황금 키워드 탐색 시작
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card shadow-sm border-0 h-100 bg-transparent">
            <div class="card-header bg-white py-3 border-bottom-0 d-flex justify-content-between align-items-center rounded shadow-sm mb-2">
                <h6 class="mb-0 fw-bold">실시간 A등급 추출 현황</h6>
                <div>
                    <button id="btnStop" class="btn btn-sm btn-danger d-none shadow-sm fw-bold" onclick="stopTask()">
                        <i class="bi bi-stop-circle-fill me-1"></i>강제 중지
                    </button>
                </div>
            </div>
            
            <div class="d-flex flex-column h-100" id="taskContainer">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h6 id="status_text" class="fw-bold mb-3 text-secondary">대기 중... (좌측에 키워드를 입력하고 시작하세요)</h6>
                        
                        <div id="progress_wrapper">
                            <div class="progress mb-2" style="height: 18px;">
                                <div id="progressBar" class="progress-bar bg-light" role="progressbar" style="width: 100%;"></div>
                            </div>
                        </div>

                        <div class="position-relative mt-2 mb-3 rounded border bg-light" style="height: 100px;">
                            <ul class="list-group list-group-flush position-absolute w-100 h-100 overflow-auto" id="log_list" style="top:0; left:0;"></ul>
                        </div>

                        <div id="result_area">
                            <div class="alert alert-light border text-center py-5 text-muted">
                                <i class="bi bi-stars fs-1 text-warning mb-2 d-block"></i>
                                분석이 시작되면 오직 <b>A등급(황금)</b>으로 판별된 키워드만<br>이곳에 리스트업 됩니다.
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let pollingTimer = null;
    let isFetching = false;
    const submitBtn = document.getElementById('submitBtn');
    const btnStop = document.getElementById('btnStop');
    const statusText = document.getElementById('status_text');
    const progressBar = document.getElementById('progressBar');
    const progressWrapper = document.getElementById('progress_wrapper');
    const logList = document.getElementById('log_list');
    const resultArea = document.getElementById('result_area');

    async function stopTask() {
        if (!confirm('분석을 강제 중단하시겠습니까?')) return;
        try {
            await fetch("{{ url_for('monitoring.stop_monitoring') }}", { method: 'POST' });
            fetchStatus(); 
        } catch(e) { alert('정지 실패'); }
    }

    function startPolling() { if (!pollingTimer) pollingTimer = setInterval(fetchStatus, 1500); }
    function stopPolling() { if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; } }

    async function fetchStatus() {
        if (isFetching) return;
        isFetching = true;
        
        try {
            const res = await fetch("{{ url_for('monitoring.status') }}");
            const data = await res.json();
            if (data.status === 'empty') return; 
            updateUI(data.data);
        } catch (e) { console.error(e); } 
        finally { isFetching = false; }
    }

    function updateUI(taskData) {
        if (taskData.is_running) {
            btnStop.classList.remove('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>분석 진행 중...';
        } else {
            btnStop.classList.add('d-none');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-search me-1"></i> 황금 키워드 탐색 시작';
            stopPolling();
        }

        // 상태 텍스트
        if (taskData.status === 'error') {
            statusText.className = 'fw-bold mb-3 text-danger';
            statusText.innerText = `중단됨: ${taskData.message}`;
        } else if (taskData.status === 'done') {
            statusText.className = 'fw-bold mb-3 text-success';
            statusText.innerText = `✨ 분석 완료! (총 ${taskData.total}개 중 황금 키워드 ${taskData.a_grade_results.length}개 발견)`;
        } else {
            statusText.className = 'fw-bold mb-3 text-primary';
            statusText.innerText = `[${taskData.current}/${taskData.total}] ${taskData.message}`;
        }

        // 게이지 바
        if (taskData.total > 0) {
            const percent = Math.round((taskData.current / taskData.total) * 100);
            let pColor = taskData.status === 'error' ? 'bg-danger' : (taskData.status === 'done' ? 'bg-success' : 'bg-warning text-dark fw-bold');
            let aClass = taskData.is_running ? 'progress-bar-striped progress-bar-animated' : '';
            
            progressWrapper.innerHTML = `
                <div class="progress mb-2" style="height: 18px;">
                    <div class="progress-bar ${pColor} ${aClass}" style="width: ${percent}%;">${percent}%</div>
                </div>
            `;
        }

        // 로그 (최신순 롤링)
        if (taskData.logs && taskData.logs.length > 0) {
            logList.innerHTML = taskData.logs.map(log => {
                let badgeClass = log.type === 'success' ? 'bg-warning text-dark fw-bold' : 'bg-secondary';
                return `
                    <li class="list-group-item d-flex justify-content-between align-items-center py-1 px-2 border-bottom text-muted" style="font-size: 0.8rem;">
                        <span class="text-truncate me-2 fw-bold" style="max-width: 250px;">${log.target}</span>
                        <span class="badge ${badgeClass} rounded-pill">${log.statusMsg}</span>
                    </li>
                `;
            }).join('');
            logList.scrollTop = logList.scrollHeight; 
        }

        // ✨ 황금 키워드(A등급) 결과 테이블 렌더링 ✨
        if (taskData.a_grade_results && taskData.a_grade_results.length > 0) {
            let rows = taskData.a_grade_results.map(res => `
                <tr>
                    <td class="fw-bold text-dark">${res.keyword}</td>
                    <td class="text-primary fw-bold">${res.search_volume > 0 ? res.search_volume.toLocaleString() : '0'}</td>
                    <td><span class="badge bg-primary rounded-pill">${res.rank}</span></td>
                    <td class="text-muted small">${res.reason}</td>
                    <td><a href="${res.link}" target="_blank" class="btn btn-sm btn-outline-dark py-0" style="font-size: 0.75rem;">네이버 확인</a></td>
                </tr>
            `).join('');
            
            resultArea.innerHTML = `
                <div class="alert alert-warning py-2 small mb-2 fw-bold text-dark border-0 shadow-sm d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-trophy-fill text-danger me-1"></i>현재 <b>${taskData.a_grade_results.length}개</b>의 황금 키워드를 찾았습니다!</div>
                </div>
                <div class="table-responsive border rounded shadow-sm" style="max-height: 350px;">
                    <table class="table table-hover table-sm mb-0 text-center align-middle" style="font-size: 0.85rem;">
                        <thead class="table-light" style="position: sticky; top: 0; z-index: 1;">
                            <tr>
                                <th>키워드명</th>
                                <th>네이버 검색량 (PC+모바일)</th>
                                <th>노출 순위</th>
                                <th>선정 사유</th>
                                <th>링크</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        } else if (taskData.status === 'done') {
            resultArea.innerHTML = `
                <div class="alert alert-secondary py-4 text-center mb-0 border-0 fw-bold">
                    <i class="bi bi-emoji-frown fs-3 d-block mb-2"></i> 아쉽게도 A등급 황금 키워드가 발견되지 않았습니다.
                </div>
            `;
        }
    }

    document.getElementById('monitorForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        
        try {
            const res = await fetch("{{ url_for('monitoring.start_monitoring') }}", { method: 'POST', body: new FormData(e.target) });
            const result = await res.json();
            if (result.success) {
                resultArea.innerHTML = '';
                logList.innerHTML = '';
                startPolling(); 
                fetchStatus(); 
            } else {
                alert(result.message);
                submitBtn.disabled = false;
            }
        } catch (err) {
            alert("서버 연결에 실패했습니다.");
            submitBtn.disabled = false;
        }
    });

    document.addEventListener("DOMContentLoaded", fetchStatus);
</script>
{% endblock %}
