{% extends "base.html" %}
{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<div class="container-fluid py-3 px-sm-2 px-md-4 mb-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
        <h3 class="mb-0 fw-bold fs-4 fs-md-3 text-info">러닝메이트 모니터링 <span class="d-none d-md-inline fs-5 text-muted">(마케팅 관리)</span></h3>
        <div class="btn-group shadow-sm mt-3 mt-md-0">
            <input type="radio" class="btn-check" name="viewMode" id="btnTableView" autocomplete="off" checked onclick="switchView('table')">
            <label class="btn btn-outline-info fw-bold px-3 px-md-4" for="btnTableView"><i class="bi bi-table"></i> 데이터 표</label>
            <input type="radio" class="btn-check" name="viewMode" id="btnGraphView" autocomplete="off" onclick="switchView('graph')">
            <label class="btn btn-outline-info fw-bold px-3 px-md-4" for="btnGraphView"><i class="bi bi-graph-up"></i> 변화량 그래프</label>
        </div>
    </div>

    <div id="tableViewWrapper">
        <ul class="nav nav-tabs mb-3 d-flex flex-nowrap overflow-auto hide-scrollbar" id="gradeTabs">
            <li class="nav-item"><a class="nav-link active fw-bold text-dark px-2 px-md-3" href="#" onclick="changeGradeTab('ALL', event)" id="tab-ALL">전체 <span class="badge bg-info rounded-pill ms-1">0</span></a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-secondary px-2 px-md-3" href="#" onclick="changeGradeTab('A', event)" id="tab-A">A등급 <span class="badge bg-secondary rounded-pill ms-1">0</span></a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-secondary px-2 px-md-3" href="#" onclick="changeGradeTab('B', event)" id="tab-B">B등급 <span class="badge bg-secondary rounded-pill ms-1">0</span></a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-secondary px-2 px-md-3" href="#" onclick="changeGradeTab('C', event)" id="tab-C">C등급 <span class="badge bg-secondary rounded-pill ms-1">0</span></a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-danger px-2 px-md-3" href="#" onclick="changeGradeTab('MAIN', event)" id="tab-MAIN">MAIN <span class="badge bg-danger rounded-pill ms-1">0</span></a></li>
        </ul>
        <div class="card shadow-sm border-0 border-top border-info border-3">
            <div class="card-body p-2 p-md-4">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-3 gap-3">
                    <div>
                        <h6 class="fw-bold mb-1 text-info fs-6 fs-md-5">키워드 및 성과 관리</h6>
                        <span class="text-muted small d-none d-md-block">네이버 A/B 자동갱신으로 수신. ISBN 관련 열은 생략된 화면입니다.</span>
                    </div>
                    <div class="d-flex flex-column flex-md-row gap-2 control-btns align-items-md-center">
                        <select id="tablePeriodSelect" class="form-select fw-bold border-info text-info w-auto" onchange="renderTable()"><option value="1" selected>하루 전</option><option value="7">1주일 전</option><option value="30">한달 전</option></select>
                        <select id="moveGradeSelect" class="form-select fw-bold text-secondary w-auto"><option value="MAIN">MAIN 이동</option><option value="A">A등급 이동</option><option value="B">B등급 이동</option><option value="C">C등급 이동</option></select>
                        <button class="btn btn-outline-secondary fw-bold text-nowrap" onclick="moveSelectedGrade()">적용</button>
                        <button class="btn btn-outline-danger fw-bold shadow-sm text-nowrap" onclick="deleteSelectedKeywords()"><i class="bi bi-trash"></i> 선택삭제</button>
                        <button class="btn btn-outline-primary fw-bold shadow-sm text-nowrap" onclick="copyToTarget('studybox')"><i class="bi bi-send"></i> 스터디박스 복사</button>
                        <button class="btn btn-outline-warning fw-bold shadow-sm text-nowrap" onclick="copyToTarget('dl')"><i class="bi bi-send"></i> DL 복사</button>
                        <button class="btn btn-outline-success fw-bold shadow-sm text-nowrap" onclick="downloadExcel()"><i class="bi bi-file-earmark-excel"></i> 엑셀 저장</button>
                    </div>
                </div>
                <div class="d-flex align-items-center bg-white rounded border px-2 py-1 mb-2 shadow-sm"><span class="small fw-bold me-2">검색량:</span><input type="number" id="minVolume" class="form-control form-control-sm border-0" placeholder="최소" style="width: 65px;"> ~ <input type="number" id="maxVolume" class="form-control form-control-sm border-0" placeholder="최대" style="width: 65px;"><input type="text" id="searchInput" class="form-control form-control-sm border-info ms-3" placeholder="키워드 검색..."><select id="sortOption" class="form-select form-select-sm fw-bold border-info ms-2 w-auto" onchange="renderTable()"><option value="recent">최근 등록순</option><option value="diff_naver_desc">N카운트 상승순</option><option value="diff_sales_desc">판매수 상승순</option></select></div>
                
                <div class="table-responsive border rounded bg-white" style="max-height: 65vh; overflow-y: auto;">
                    <table class="table table-hover table-bordered text-center align-middle mb-0" style="font-size: 0.85rem; white-space: nowrap;">
                        <thead class="table-light text-muted" style="position: sticky; top: 0; z-index: 1;">
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="selectAll" class="form-check-input" onclick="toggleAll(this)"></th>
                                <th>순번</th><th>등록날짜</th><th>키워드</th>
                                <th class="text-primary fw-bold"><i class="bi bi-graph-up-arrow"></i> 네이버카운트</th>
                                <th class="text-danger fw-bold"><i class="bi bi-graph-up-arrow"></i> 판매수</th> 
                                <th>순위</th><th>키워드검색</th><th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="savedKeywordsBody"><tr><td colspan="9" class="text-center py-5">로딩 중...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="graphViewWrapper" class="d-none">
        <div class="card shadow-sm border-0 border-top border-info border-3">
            <div class="card-body p-4">
                <div class="row bg-light p-3 rounded align-items-center mb-4">
                    <div class="col-md-5 mb-3 mb-md-0"><div class="d-flex gap-2"><input type="text" id="graphKeywordSearch" class="form-control form-control-sm" placeholder="검색..." oninput="filterGraphBooks()"><select id="graphBookSelect" class="form-select form-select-sm border-info fw-bold" onchange="renderChart()"></select></div></div>
                    <div class="col-md-4 mb-3 mb-md-0"><select id="graphTypeSelect" class="form-select form-select-sm fw-bold" onchange="renderChart()"><option value="naver">네이버 카운트 변화</option><option value="sales">판매수 변화</option></select></div>
                    <div class="col-md-3"><select id="graphPeriodSelect" class="form-select form-select-sm fw-bold" onchange="renderChart()"><option value="1">최근 1일</option><option value="7">최근 1주일</option><option value="30" selected>최근 1개월</option></select></div>
                </div>
                <div id="chartContainer" class="bg-white border rounded p-3 w-100" style="height: 450px;"><canvas id="trendChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-neon-green { background-color: #00ff00 !important; color: #000; font-weight: 800; } .bg-neon-yellow { background-color: #ffff00 !important; color: #000; font-weight: 800; } .bg-neon-orange { background-color: #ff9900 !important; color: #000; font-weight: 800; } .bg-neon-pink { background-color: #ffb6c1 !important; color: #000; font-weight: 800; }
    .row-selected { background-color: #e8f4f8 !important; } .editable-cell { cursor: pointer; transition: 0.2s; } .editable-cell:hover { background-color: #f8f9fa; outline: 1px dashed #0dcaf0; } .graph-link-cell { cursor: pointer; transition: 0.2s; } .graph-link-cell:hover { background-color: #e9ecef; outline: 2px solid #0dcaf0; }
</style>

<script>
    let isEditing = false, allKeywordsData = [], searchQuery = '', currentSort = 'recent', currentGradeTab = 'ALL', checkedIds = new Set(), chartInstance = null;

    function switchView(mode) { document.getElementById('tableViewWrapper').classList.toggle('d-none', mode !== 'table'); document.getElementById('graphViewWrapper').classList.toggle('d-none', mode === 'table'); if(mode !== 'table') { populateGraphSelect(); setTimeout(() => renderChart(), 150); } }
    function changeGradeTab(grade, e) { if(e) e.preventDefault(); currentGradeTab = grade; document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active')); document.getElementById('tab-'+grade).classList.add('active'); renderTable(); }

    ['searchInput', 'minVolume', 'maxVolume'].forEach(id => document.getElementById(id).addEventListener('input', function(e) { if(id==='searchInput') searchQuery=e.target.value.toLowerCase().trim(); renderTable(); }));
    
    async function loadSavedKeywords() {
        if(isEditing) return;
        try {
            const res = await fetch("{{ url_for('monitoring.get_saved_keywords', target_page='rm') }}");
            const data = await res.json();
            if(data.success) { allKeywordsData = data.data; renderTable(); populateGraphSelect(); }
        } catch(e) {}
    }

    function populateGraphSelect() {
        const sel = document.getElementById('graphBookSelect'); if(!sel) return;
        sel.innerHTML = allKeywordsData.map(k => `<option value="${k.id}">${k.keyword||'이름없음'}</option>`).join('');
    }
    function filterGraphBooks() {
        const q = document.getElementById('graphKeywordSearch').value.toLowerCase();
        const sel = document.getElementById('graphBookSelect');
        sel.innerHTML = allKeywordsData.filter(k => String(k.keyword||'').toLowerCase().includes(q)).map(k => `<option value="${k.id}">${k.keyword}</option>`).join('');
        if(sel.options.length>0) { sel.value = sel.options[0].value; renderChart(); } else if(chartInstance) chartInstance.destroy();
    }
    function goToGraph(bookId, type) {
        document.getElementById('btnGraphView').checked = true; switchView('graph'); document.getElementById('graphBookSelect').value = bookId; document.getElementById('graphTypeSelect').value = type; setTimeout(() => renderChart(), 150);
    }
    function getRankNum(r) { return (!r || r==='-' || r.includes('밖') || r.includes('에러')) ? 9999 : parseInt(r.replace(/[^0-9]/g, '')) || 9999; }
    function handleRowCheck(e, cb) { if(cb.checked) checkedIds.add(cb.value); else checkedIds.delete(cb.value); document.getElementById('selectAll').checked = false; }
    function toggleAll(s) { document.querySelectorAll('.row-checkbox').forEach(cb => { cb.checked = s.checked; if(s.checked) checkedIds.add(cb.value); else checkedIds.delete(cb.value); }); }

    function renderTable() {
        const tbody = document.getElementById('savedKeywordsBody');
        let pDays = parseInt(document.getElementById('tablePeriodSelect').value) || 1;
        let fd = allKeywordsData.filter(k => {
            k._dN = 0; k._dS = 0;
            if(k.history && k.history.length > 0) {
                let cH = k.history[k.history.length-1], pH = k.history[Math.max(0, k.history.length - 1 - pDays)];
                k._dN = cH.search_volume - pH.search_volume; k._dS = (cH.sales_quantity||0) - (pH.sales_quantity||0);
            }
            let m = true; if(searchQuery) m = String(k.keyword||'').toLowerCase().includes(searchQuery);
            return currentGradeTab==='ALL' ? m : (k.grade===currentGradeTab && m);
        });

        if(currentSort==='diff_naver_desc') fd.sort((a,b)=>b._dN-a._dN); else if(currentSort==='diff_sales_desc') fd.sort((a,b)=>b._dS-a._dS); else fd.sort((a,b)=>b.id-a.id);

        if(fd.length > 0) {
            tbody.innerHTML = fd.map((k, i) => {
                let bg = k.grade==='B'?'bg-neon-yellow':k.grade==='C'?'bg-neon-orange':k.grade==='MAIN'?'bg-neon-pink':'bg-neon-green';
                let fb = (d) => d>0?`<span class="badge bg-danger ms-1">+${d}</span>`:d<0?`<span class="badge bg-primary ms-1">${d}</span>`:`<span class="badge bg-secondary ms-1">-</span>`;
                let sr = String(k.store_rank||'-'), psr = String(k.prev_store_rank||'-'), rd = `<span class="fs-6 fw-bold">${sr}</span>`;
                if(psr!=='-'&&sr!==psr&&!sr.includes('중')){ let pn=getRankNum(psr), cn=getRankNum(sr); if(cn<pn)rd+=`<br><span class="rank-up">▲ ${pn-cn}</span>`; else if(cn>pn)rd+=`<br><span class="rank-down">▼ ${cn-pn}</span>`;}
                
                // ✨ 다이어트 테이블 렌더링
                return `
                <tr>
                    <td class="align-middle bg-light"><input type="checkbox" class="form-check-input row-checkbox" value="${k.id}" onclick="handleRowCheck(event, this)" ${checkedIds.has(k.id.toString())?'checked':''}></td>
                    <td class="align-middle fw-bold">${i+1}</td><td class="align-middle text-muted small">${k.registered_at||'-'}</td>
                    <td class="align-middle ${bg} fw-bold editable-cell" data-id="${k.id}" data-field="keyword">${k.keyword||'-'}</td>
                    <td class="align-middle ${bg} fs-6 graph-link-cell" data-id="${k.id}" data-type="naver">${(k.search_volume||0).toLocaleString()}<br>${fb(k._dN)}</td>
                    <td class="align-middle text-danger fw-bold fs-6 graph-link-cell" data-id="${k.id}" data-type="sales">${k.sales_quantity||'-'}<br>${fb(k._dS)}</td>
                    <td class="align-middle ${bg} text-dark editable-cell" data-id="${k.id}" data-field="store_rank">${rd}</td>
                    <td class="align-middle"><a href="https://search.naver.com/search.naver?where=nexearch&query=${encodeURIComponent(k.keyword||'')}" target="_blank" class="btn btn-sm btn-outline-secondary py-0 px-2"><i class="bi bi-search"></i></a></td>
                    <td class="align-middle"><button class="btn btn-sm btn-danger py-0 px-2" onclick="deleteKeyword(${k.id})"><i class="bi bi-trash"></i></button></td>
                </tr>`;
            }).join('');
        } else { tbody.innerHTML = `<tr><td colspan="9" class="text-center py-5">데이터가 없습니다.</td></tr>`; }
    }

    function renderChart() {
        if(typeof Chart === 'undefined') return;
        const bs = document.getElementById('graphBookSelect'); if(!bs||!bs.value) return;
        const type = document.getElementById('graphTypeSelect').value; 
        const pDays = parseInt(document.getElementById('graphPeriodSelect').value) || 30;
        const b = allKeywordsData.find(k => k.id == bs.value); if(!b||!b.history) return;

        let hist = b.history.length > pDays + 1 ? b.history.slice(b.history.length - (pDays + 1)) : b.history;
        document.getElementById('chartContainer').innerHTML = '<canvas id="trendChart"></canvas>';
        chartInstance = new Chart(document.getElementById('trendChart').getContext('2d'), {
            type: 'line', data: { labels: hist.map(h => h.date), datasets: [{ label: `[${b.keyword}] ${type==='naver'?'N카운트':'판매수'} 변화`, data: hist.map(h => Number(type==='naver'?h.search_volume:h.sales_quantity)||0), borderColor: type==='naver'?'#dc3545':'#0dcaf0', backgroundColor: type==='naver'?'rgba(220,53,69,0.2)':'rgba(13,202,240,0.2)', borderWidth: 2, fill: true, tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { x: { grid: { display: false } } } }
        });
    }

    async function copyToTarget(targetCode) {
        if(checkedIds.size===0) return alert('복사할 항목 선택!');
        const fd = new FormData(); checkedIds.forEach(id => fd.append('ids[]', id)); fd.append('target', targetCode); fd.append('source_target', 'rm');
        const res = await fetch("{{ url_for('monitoring.copy_to_target') }}", { method: 'POST', body: fd });
        alert((await res.json()).message); checkedIds.clear(); document.getElementById('selectAll').checked=false; renderTable();
    }

    document.getElementById('savedKeywordsBody').addEventListener('dblclick', function(e) {
        let gc = e.target.closest('.graph-link-cell'); if(gc) return goToGraph(gc.getAttribute('data-id'), gc.getAttribute('data-type'));
        let td = e.target.closest('.editable-cell'); if(!td || isEditing) return; isEditing = true; 
        let id = parseInt(td.getAttribute('data-id')), field = td.getAttribute('data-field');
        let input = document.createElement('input'); input.type = 'text'; input.value = td.textContent.trim(); input.className = `form-control form-control-sm text-center shadow-sm border-info`;
        td.innerHTML = ''; td.appendChild(input); input.focus();
        let isSaved = false;
        async function saveChanges() {
            if(isSaved) return; isSaved = true; let newVal = input.value.trim();
            const fd = new FormData(); fd.append('id', id); fd.append(field, newVal||'-'); fd.append('target_page', 'rm');
            await fetch("{{ url_for('monitoring.update_keyword') }}", { method: 'POST', body: fd });
            allKeywordsData.find(i=>i.id===id)[field] = newVal||'-'; isEditing = false; renderTable(); 
        }
        input.addEventListener('blur', saveChanges); input.addEventListener('keypress', e => { if(e.key==='Enter') saveChanges(); });
    });

    async function deleteSelectedKeywords() { if(checkedIds.size===0||!confirm('삭제하시겠습니까?')) return; const fd = new FormData(); checkedIds.forEach(id => fd.append('ids[]', id)); fd.append('target_page', 'rm'); await fetch("{{ url_for('monitoring.delete_keywords_bulk') }}", { method: 'POST', body: fd }); checkedIds.clear(); loadSavedKeywords(); }
    async function deleteKeyword(id) { if(!confirm('삭제?')) return; const fd = new FormData(); fd.append('id', id); fd.append('target_page', 'rm'); await fetch("{{ url_for('monitoring.delete_keyword') }}", { method: 'POST', body: fd }); loadSavedKeywords(); }
    async function moveSelectedGrade() { if(checkedIds.size===0) return; const fd = new FormData(); checkedIds.forEach(id => fd.append('ids[]', id)); fd.append('grade', document.getElementById('moveGradeSelect').value); fd.append('target_page', 'rm'); await fetch("{{ url_for('monitoring.change_grade') }}", { method: 'POST', body: fd }); checkedIds.clear(); loadSavedKeywords(); }
    
    function downloadExcel() {
        let csvContent = "\uFEFF순번,등록일자,키워드,등급,검색량,판매수,순위\n";
        allKeywordsData.forEach((k, idx) => csvContent += [idx+1, k.registered_at, k.keyword, k.grade, k.search_volume, k.sales_quantity, k.store_rank].map(v => `"${(v||'').toString().replace(/"/g, '""')}"`).join(",") + "\n");
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.download = "러닝메이트_데이터.csv"; document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
    document.addEventListener("DOMContentLoaded", loadSavedKeywords);
</script>
{% endblock %}
