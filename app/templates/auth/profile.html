{% extends "base.html" %}
{% block content %}
<h3 class="mb-4 fw-bold">계정 설정</h3>
<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h6 class="mb-0 fw-bold">아이디 및 비밀번호 변경</h6>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">새 아이디 (변경하지 않으려면 기존 아이디 유지)</label>
                        <input type="text" name="new_username" class="form-control" value="{{ current_user.username }}" required>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">새 비밀번호 (변경 시에만 입력)</label>
                        <input type="password" name="new_password" class="form-control" placeholder="새로운 비밀번호를 입력하세요">
                        <div class="form-text">비밀번호를 변경하지 않으려면 비워두세요.</div>
                    </div>

                    <div class="mb-4 bg-light p-3 rounded border">
                        <label class="form-label text-danger small fw-bold"><i class="bi bi-shield-lock"></i> 본인 확인 (현재 비밀번호)</label>
                        <input type="password" name="current_password" class="form-control border-danger" placeholder="현재 사용 중인 비밀번호 필수 입력" required>
                        <div class="form-text text-danger">정보를 수정하려면 현재 비밀번호를 반드시 입력해야 합니다.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">변경 내용 저장하기</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
