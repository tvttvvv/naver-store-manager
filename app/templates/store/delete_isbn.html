{% extends "base.html" %}
{% block content %}
<h3 class="mb-4 fw-bold">상품 삭제 관리</h3>
<div class="row">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <form id="deleteForm">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted d-flex justify-content-between align-items-center">
                            <span>대상 상점 선택 (다중 선택 가능)</span>
                            <button type="button" class="btn btn-sm btn-outline-secondary py-0" onclick="selectAllStores()">전체선택</button>
                        </label>
                        <div class="card p-3 shadow-sm border-0 bg-light" style="max-height: 200px; overflow-y: auto;">
                            {% for key in api_keys %}
                            <div class="form-check mb-2">
                                <input class="form-check-input store-checkbox" type="checkbox" name="selected_stores" value="{{ key.id }}" id="store_{{ key.id }}">
                                <label class="form-check-label fw-bold" for="store_{{ key.id }}">
                                    {{ key.store_name }}
                                </label>
                            </div>
                            {% else %}
                            <div class="text-muted text-center small">등록된 상점이 없습니다.</div>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="mb-4 border-bottom pb-4">
                        <label class="form-label fw-bold text-muted">삭제 방식 선택</label>
                        <div class="d-flex flex-column gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delete_mode" id="mode_isbn" value="isbn" checked onchange="toggleMode()">
                                <label class="form-check-label" for="mode_isbn">특정 상품 삭제 (ISBN)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delete_mode" id="mode_all" value="all" onchange="toggleMode()">
                                <label class="form-check-label text-danger fw-bold" for="mode_all">전체 상품 일괄 삭제 (하이브리드 모드)</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4" id="isbnInputDiv">
                        <label class="form-label fw-bold text-muted">삭제할 ISBN 리스트</label>
                        <textarea name="isbn_list" id="isbn_list" class="form-control" rows="6" placeholder="예: 9788912345678&#10;여러 줄로 입력 가능" required></textarea>
                    </div>

                    <div class="alert alert-danger d-none mb-4 shadow-sm" id="warningDiv">
                        <i class="bi bi-exclamation-triangle-fill fs-4 d-block mb-2 text-center"></i>
                        <p class="mb-0 text-center fw-bold">
                            주의! 선택한 상점들의 모든 상품이 삭제되거나 중지 처리됩니다.
                        </p>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm" id="submitBtn">선택한 상점 동시 작업 시작</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-7">
        <div class="card shadow-sm border-0 h-100 bg-transparent">
            <div class="card-header bg-white py-3 border-bottom-0 d-flex justify-content-between align-items-center rounded shadow-sm mb-2">
                <h6 class="mb-0 fw-bold">실시간 멀티 작업 현황</h6>
                <div>
                    <button id="btnStopAll" class="btn btn-sm btn-danger d-none shadow-sm fw-bold" onclick="stopTask('all')">
                        <i class="bi bi-stop-circle-fill me-1"></i>전체 긴급 정지
                    </button>
                </div>
            </div>
            
            <div class="d-flex flex-column h-100" id="taskContainer" style="overflow-y: auto; overflow-x: hidden;">
                <div id="initialState" class="card border-0 shadow-sm text-center py-5 text-muted flex-grow-1 d-flex flex-column justify-content-center">
                    <i class="bi bi-ui-checks-grid fs-1 d-block mb-2 text-secondary"></i>
                    <p class="mb-0">왼쪽에서 상점을 체크하시면<br>이곳에 작업 카드가 실시간으로 생성됩니다.</p>
                </div>
                <div class="row g-3 px-1 pb-2" id="cardsGrid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const cardsGrid = document.getElementById('cardsGrid');
    const initialState = document.getElementById('initialState');

    function renderDynamicCards() {
        const checkedBoxes = Array.from(document.querySelectorAll('.store-checkbox:checked'));
        if (checkedBoxes.length === 0) {
            initialState.classList.remove('d-none');
            Array.from(cardsGrid.children).forEach(card => {
                if(card.dataset.status === 'ready') card.remove();
            });
            return;
        }
        initialState.classList.add('d-none');

        checkedBoxes.forEach(cb => {
            const storeId = cb.value;
            const storeName = cb.nextElementSibling.innerText.trim();
            let card = document.getElementById(`task_card_${storeId}`);
            
            if (!card) {
                card = document.createElement('div');
                card.className = "col-12";
                card.id = `task_card_${storeId}`;
                card.dataset.status = 'ready'; 
                card.innerHTML = `
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                                <h6 class="fw-bold mb-0 text-dark"><i class="bi bi-shop me-2 text-primary"></i>${storeName}</h6>
                                <button id="btn_stop_${storeId}" class="btn btn-sm btn-outline-secondary fw-bold" disabled>대기 중</button>
                            </div>
                            <h6 id="status_text_${storeId}" class="fw-bold mb-3 text-secondary small">버튼을 눌러 작업을 시작하세요.</h6>
                            <div id="progress_wrapper_${storeId}">
                                <div class="progress mb-2" style="height: 16px;"><div class="progress-bar bg-light" style="width: 100%;"></div></div>
                            </div>
                            <div class="position-relative mt-2 rounded border bg-light" style="height: 120px;">
                                <ul class="list-group list-group-flush position-absolute w-100 h-100 overflow-auto" id="log_list_${storeId}" style="top:0; left:0;"></ul>
                            </div>
                        </div>
                    </div>
                `;
                cardsGrid.appendChild(card);
            }
        });

        Array.from(cardsGrid.children).forEach(card => {
            const sid = card.id.replace('task_card_', '');
            if (!document.getElementById(`store_${sid}`).checked && card.dataset.status === 'ready') {
                card.remove();
            }
        });
    }

    document.querySelectorAll('.store-checkbox').forEach(cb => {
        cb.addEventListener('change', renderDynamicCards);
    });

    function selectAllStores() {
        const checkboxes = document.querySelectorAll('.store-checkbox');
        const allChecked = Array.from(checkboxes).every(c => c.checked);
        checkboxes.forEach(c => c.checked = !allChecked);
        renderDynamicCards(); 
    }

    function toggleMode() {
        const isIsbn = document.getElementById('mode_isbn').checked;
        const isAll = document.getElementById('mode_all').checked;

        document.getElementById('isbnInputDiv').classList.toggle('d-none', !isIsbn);
        document.getElementById('isbn_list').required = isIsbn;
        document.getElementById('warningDiv').classList.toggle('d-none', isIsbn);
        
        const btn = document.getElementById('submitBtn');
        if (!btn.disabled) {
            if (isIsbn) {
                btn.className = "btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm";
                btn.innerHTML = '선택한 상점 동시 작업 시작';
            } else if (isAll) {
                btn.className = "btn btn-danger w-100 py-3 fw-bold fs-5 shadow-sm";
                btn.innerHTML = '<i class="bi bi-exclamation-octagon me-2"></i>모든 상점 하이브리드 삭제 실행';
            } 
        }
    }

    async function stopTask(storeId) {
        if (!confirm(storeId === 'all' ? '모든 상점의 작업을 강제 정지하시겠습니까?' : '해당 상점의 작업을 강제 정지하시겠습니까?')) return;
        try {
            const fd = new FormData();
            fd.append('store_id', storeId);
            await fetch("{{ url_for('store.stop_task') }}", { method: 'POST', body: fd });
            fetchStatus(); 
        } catch(e) { alert('정지 요청에 실패했습니다.'); }
    }

    let pollingInterval = null;
    const submitBtn = document.getElementById('submitBtn');
    const btnStopAll = document.getElementById('btnStopAll');

    function startPolling() {
        if (!pollingInterval) pollingInterval = setInterval(fetchStatus, 1000);
    }

    function stopPolling() {
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
    }

    async function fetchStatus() {
        try {
            const res = await fetch("{{ url_for('store.get_task_status') }}");
            const data = await res.json();
            if (data.status === 'empty') return; 
            updateUI(data.tasks);
        } catch (e) { console.error(e); }
    }

    function updateUI(tasks) {
        let anyRunning = false;
        initialState.classList.add('d-none');
        
        for (const storeId in tasks) {
            const taskData = tasks[storeId];
            if (taskData.is_running) anyRunning = true;
            
            // ✨ 새로고침해도 체크박스 유지되도록 보정 ✨
            const cb = document.getElementById(`store_${storeId}`);
            if (cb && !cb.checked) cb.checked = true;

            let card = document.getElementById(`task_card_${storeId}`);
            if (!card) {
                card = document.createElement('div');
                card.className = "col-12";
                card.id = `task_card_${storeId}`;
                card.innerHTML = `
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                                <h6 class="fw-bold mb-0 text-dark"><i class="bi bi-shop me-2 text-primary"></i>${taskData.store_name}</h6>
                                <button id="btn_stop_${storeId}" class="btn btn-sm btn-outline-danger fw-bold" onclick="stopTask('${storeId}')">개별 정지</button>
                            </div>
                            <h6 id="status_text_${storeId}" class="fw-bold mb-3 text-primary small">로딩 중...</h6>
                            <div id="progress_wrapper_${storeId}"></div>
                            <div class="position-relative mt-2 rounded border bg-light" style="height: 120px;">
                                <ul class="list-group list-group-flush position-absolute w-100 h-100 overflow-auto" id="log_list_${storeId}" style="top:0; left:0;"></ul>
                            </div>
                        </div>
                    </div>
                `;
                cardsGrid.appendChild(card);
            }
            card.dataset.status = 'running'; 

            const statusText = document.getElementById(`status_text_${storeId}`);
            const progressWrapper = document.getElementById(`progress_wrapper_${storeId}`);
            const logList = document.getElementById(`log_list_${storeId}`);
            const btnStop = document.getElementById(`btn_stop_${storeId}`);
            
            if (taskData.is_running) {
                btnStop.disabled = false;
                btnStop.innerHTML = '개별 정지';
                btnStop.className = "btn btn-sm btn-outline-danger fw-bold";
            } else {
                btnStop.disabled = true;
                if (taskData.status === 'done') {
                    btnStop.innerHTML = '<i class="bi bi-check-circle"></i> 완벽 정리됨';
                    btnStop.className = "btn btn-sm btn-success fw-bold text-white";
                } else {
                    btnStop.innerHTML = '강제 중단됨';
                    btnStop.className = "btn btn-sm btn-secondary fw-bold";
                }
            }

            if (taskData.status === 'error') {
                statusText.className = 'fw-bold mb-3 text-danger small';
                statusText.innerText = `오류/정지: ${taskData.message}`;
            } else if (taskData.status === 'done') {
                statusText.className = 'fw-bold mb-3 text-success small';
                statusText.innerText = `✨ 작업 완료! (성공: ${taskData.success_count}건, 실패: ${taskData.fail_count}건)`;
            } else {
                statusText.className = 'fw-bold mb-3 text-primary small';
                statusText.innerText = taskData.target_name ? `[${taskData.current}${taskData.total > 0 ? '/' + taskData.total : '번째'}] ${taskData.target_name} 처리 중...` : taskData.message;
            }

            let pColor = taskData.status === 'error' ? 'bg-danger' : (taskData.status === 'done' ? 'bg-success' : 'bg-primary');
            let aClass = taskData.is_running ? 'progress-bar-striped progress-bar-animated' : '';
            let barText = '';
            let labelText = '';

            if (taskData.status === 'done') {
                barText = '작업 100% 완료';
                labelText = '종료됨';
            } else if (taskData.status === 'error') {
                barText = '정지됨';
                labelText = '중단됨';
            } else {
                barText = taskData.total > 0 ? '' : '싹쓸이 스캔 진행 중...';
                labelText = '가동 중';
            }

            if (taskData.total > 0) {
                const percent = Math.round((taskData.current / taskData.total) * 100);
                if (taskData.status !== 'done' && taskData.status !== 'error') barText = `${percent}%`;
                
                progressWrapper.innerHTML = `
                    <div class="progress mb-2" style="height: 18px;">
                        <div class="progress-bar ${pColor} ${aClass}" role="progressbar" style="width: ${taskData.status === 'done' ? 100 : percent}%;">${barText}</div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small fw-bold" style="font-size: 0.8rem;">
                        <span>${taskData.current} / ${taskData.total}</span>
                        <span>${taskData.status === 'done' ? '100%' : percent + '%'}</span>
                    </div>
                `;
            } else {
                progressWrapper.innerHTML = `
                    <div class="progress mb-2" style="height: 18px;">
                        <div class="progress-bar ${pColor} ${aClass}" role="progressbar" style="width: 100%;">${barText}</div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small fw-bold" style="font-size: 0.8rem;">
                        <span>현재 ${taskData.current}개 처리 완료</span>
                        <span>${labelText}</span>
                    </div>
                `;
            }

            if (taskData.logs && taskData.logs.length > 0) {
                logList.innerHTML = taskData.logs.map(log => {
                    let badgeClass = log.type === 'success' ? 'bg-success' : (log.type === 'danger' ? 'bg-danger' : 'bg-info text-dark');
                    return `
                        <li class="list-group-item d-flex justify-content-between align-items-center py-1 px-2 border-bottom text-muted" style="font-size: 0.75rem;">
                            <span class="text-truncate me-2 font-monospace" style="max-width: 140px;" title="${log.target}">${log.target}</span>
                            <span class="badge ${badgeClass} rounded-pill">${log.statusMsg}</span>
                        </li>
                    `;
                }).join('');
                logList.scrollTop = logList.scrollHeight; 
            }
        }
        
        btnStopAll.classList.toggle('d-none', !anyRunning);
        submitBtn.disabled = anyRunning;
        
        if (anyRunning) {
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>백그라운드 작업 진행 중...';
        } else {
            toggleMode(); 
            stopPolling();
        }
    }

    document.getElementById('deleteForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const checkboxes = document.querySelectorAll('.store-checkbox:checked');
        if(checkboxes.length === 0) { alert('작업을 진행할 상점을 하나 이상 선택해주세요.'); return; }

        if (document.getElementById('mode_all').checked) {
            if (!confirm(`선택하신 ${checkboxes.length}개 상점의 [전체 상품]을 치우시겠습니까?\n이 작업은 멀티 스레드로 안전하게 실행됩니다.`)) return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>서버 전송 중...';

        try {
            const res = await fetch("{{ url_for('store.start_task') }}", { method: 'POST', body: new FormData(e.target) });
            const result = await res.json();
            
            if (result.success) {
                startPolling(); 
                fetchStatus(); 
            } else {
                alert(result.message);
                submitBtn.disabled = false;
                toggleMode();
            }
        } catch (err) {
            alert("서버 연결에 실패했습니다.");
            submitBtn.disabled = false;
            toggleMode();
        }
    });

    document.addEventListener("DOMContentLoaded", fetchStatus);
</script>
{% endblock %}
