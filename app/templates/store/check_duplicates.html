{% extends "base.html" %}
{% block content %}
<h3 class="mb-4 fw-bold">상품 중복 체크</h3>
<div class="row">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <form id="checkForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted d-flex justify-content-between align-items-center">
                            <span>검사 대상 상점 (다중 선택 가능)</span>
                            <button type="button" class="btn btn-sm btn-outline-secondary py-0" onclick="selectAllStores()">전체선택</button>
                        </label>
                        <div class="card p-3 shadow-sm border-0 bg-light" style="max-height: 250px; overflow-y: auto;">
                            {% for key in api_keys %}
                            <div class="form-check mb-2">
                                <input class="form-check-input store-checkbox" type="checkbox" name="selected_stores" value="{{ key.id }}" id="store_{{ key.id }}">
                                <label class="form-check-label fw-bold" for="store_{{ key.id }}">
                                    {{ key.store_name }}
                                </label>
                            </div>
                            {% else %}
                            <div class="text-muted text-center small">등록된 상점이 없습니다.</div>
                            {% endfor %}
                        </div>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 fw-bold fs-5 shadow-sm">
                        선택 상점 동시 중복 체크 시작
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-7">
        <div class="card shadow-sm border-0 h-100 bg-transparent">
            <div class="card-header bg-white py-3 border-bottom-0 d-flex justify-content-between align-items-center rounded shadow-sm mb-2">
                <h6 class="mb-0 fw-bold">상점별 중복 검사 현황</h6>
                <div class="d-flex align-items-center">
                    <button id="btnRefresh" class="btn btn-sm btn-outline-primary d-none shadow-sm fw-bold me-2" onclick="fetchStatus(true)">
                        <i class="bi bi-arrow-clockwise me-1"></i>새로고침
                    </button>
                    <button id="btnStopAll" class="btn btn-sm btn-danger d-none shadow-sm fw-bold" onclick="stopTask('all')">
                        <i class="bi bi-stop-circle-fill me-1"></i>전체 정지
                    </button>
                </div>
            </div>
            
            <div class="d-flex flex-column h-100" id="taskContainer" style="overflow-y: auto; overflow-x: hidden;">
                <div id="initialState" class="card border-0 shadow-sm text-center py-5 text-muted flex-grow-1 d-flex flex-column justify-content-center">
                    <i class="bi bi-search fs-1 d-block mb-2 text-secondary"></i>
                    <p class="mb-0">상점을 체크하고 검사를 시작하시면<br>여기에 실시간 수집 현황과 중복 결과가 나타납니다.</p>
                </div>
                <div class="row g-3 px-1 pb-2" id="cardsGrid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const cardsGrid = document.getElementById('cardsGrid');
    const initialState = document.getElementById('initialState');

    function renderDynamicCards() {
        const checkedBoxes = Array.from(document.querySelectorAll('.store-checkbox:checked'));
        if (checkedBoxes.length === 0) {
            initialState.classList.remove('d-none');
            Array.from(cardsGrid.children).forEach(card => {
                if(card.dataset.status === 'ready') card.remove();
            });
            return;
        }
        initialState.classList.add('d-none');

        checkedBoxes.forEach(cb => {
            const storeId = cb.value;
            const storeName = cb.nextElementSibling.innerText.trim();
            let card = document.getElementById(`task_card_${storeId}`);
            if (!card) {
                card = document.createElement('div');
                card.className = "col-12";
                card.id = `task_card_${storeId}`;
                card.dataset.status = 'ready';
                card.innerHTML = `
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                                <h6 class="fw-bold mb-0 text-dark"><i class="bi bi-shop me-2 text-primary"></i>${storeName}</h6>
                                <button id="btn_stop_${storeId}" class="btn btn-sm btn-outline-secondary fw-bold" disabled>대기 중</button>
                            </div>
                            <h6 id="status_text_${storeId}" class="fw-bold mb-3 text-secondary small">버튼을 눌러 중복 검사를 시작하세요.</h6>
                            <div id="dup_result_area_${storeId}"></div>
                        </div>
                    </div>
                `;
                cardsGrid.appendChild(card);
            }
        });

        Array.from(cardsGrid.children).forEach(card => {
            const sid = card.id.replace('task_card_', '');
            if (!document.getElementById(`store_${sid}`).checked && card.dataset.status === 'ready') {
                card.remove();
            }
        });
    }

    document.querySelectorAll('.store-checkbox').forEach(cb => { cb.addEventListener('change', renderDynamicCards); });

    function selectAllStores() {
        const checkboxes = document.querySelectorAll('.store-checkbox');
        const allChecked = Array.from(checkboxes).every(c => c.checked);
        checkboxes.forEach(c => c.checked = !allChecked);
        renderDynamicCards();
    }

    // ✨ 중복 ISBN 일괄 복사 기능 ✨
    function copyIsbns(storeId) {
        const textArea = document.getElementById(`hidden_isbns_${storeId}`);
        if (!textArea || !textArea.value.trim()) {
            alert('복사할 유효한 ISBN이 없습니다.');
            return;
        }
        navigator.clipboard.writeText(textArea.value).then(() => {
            alert('중복된 ISBN이 클립보드에 복사되었습니다!\n삭제 탭에 가서 그대로 붙여넣기 하세요.');
        }).catch(err => {
            alert('복사에 실패했습니다. 권한을 확인해주세요.');
        });
    }

    async function stopTask(storeId) {
        if (!confirm('검사를 강제 중단하시겠습니까?')) return;
        try {
            const fd = new FormData();
            fd.append('store_id', storeId);
            await fetch("{{ url_for('store.stop_dup_task') }}", { method: 'POST', body: fd });
            fetchStatus(true); 
        } catch(e) { alert('정지 요청 실패'); }
    }

    let pollingTimer = null;
    let isFetching = false;
    const submitBtn = document.getElementById('submitBtn');
    const btnStopAll = document.getElementById('btnStopAll');
    const btnRefresh = document.getElementById('btnRefresh');

    function startPolling() {
        if (!pollingTimer) {
            pollingTimer = setInterval(() => fetchStatus(false), 1500); // ✨ 브라우저 멈춤 방지를 위해 1.5초 간격으로 완화
        }
    }
    
    function stopPolling() { 
        if (pollingTimer) { 
            clearInterval(pollingTimer); 
            pollingTimer = null; 
        } 
    }

    // isManual 플래그를 통해 사용자가 새로고침 버튼을 누른 건지 판별
    async function fetchStatus(isManual = false) {
        if (isFetching && !isManual) return; // 통신 중첩 방지 (프리즈 해결)
        isFetching = true;
        
        try {
            const res = await fetch("{{ url_for('store.get_dup_task_status') }}");
            const data = await res.json();
            if (data.status === 'empty') return; 
            updateUI(data.tasks);
        } catch (e) { 
            console.error(e); 
        } finally {
            isFetching = false;
        }
    }

    function updateUI(tasks) {
        let anyRunning = false;
        let anyTaskExists = false;
        initialState.classList.add('d-none');
        
        for (const storeId in tasks) {
            anyTaskExists = true;
            const taskData = tasks[storeId];
            if (taskData.is_running) anyRunning = true;
            
            let card = document.getElementById(`task_card_${storeId}`);
            if (!card) {
                card = document.createElement('div');
                card.className = "col-12";
                card.id = `task_card_${storeId}`;
                card.innerHTML = `
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                                <h6 class="fw-bold mb-0 text-dark"><i class="bi bi-shop me-2 text-primary"></i>${taskData.store_name}</h6>
                                <button id="btn_stop_${storeId}" class="btn btn-sm btn-outline-danger fw-bold" onclick="stopTask('${storeId}')">개별 정지</button>
                            </div>
                            <h6 id="status_text_${storeId}" class="fw-bold mb-3 text-primary small">로딩 중...</h6>
                            <div id="dup_result_area_${storeId}"></div>
                        </div>
                    </div>
                `;
                cardsGrid.appendChild(card);
            }
            card.dataset.status = 'running';

            const statusText = document.getElementById(`status_text_${storeId}`);
            const resultArea = document.getElementById(`dup_result_area_${storeId}`);
            const btnStop = document.getElementById(`btn_stop_${storeId}`);
            
            if (taskData.is_running) {
                btnStop.disabled = false;
                btnStop.innerHTML = '검사 중지';
                btnStop.className = "btn btn-sm btn-outline-danger fw-bold";
            } else {
                btnStop.disabled = true;
                btnStop.innerHTML = '검사 완료됨';
                btnStop.className = "btn btn-sm btn-secondary fw-bold";
            }

            if (taskData.status === 'error') {
                statusText.className = 'fw-bold mb-3 text-danger small';
                statusText.innerText = `오류/정지: ${taskData.message}`;
            } else if (taskData.status === 'done') {
                statusText.className = 'fw-bold mb-3 text-success small';
                statusText.innerText = `✨ 총 ${taskData.total}개 판매중 상품 스캔 완료!`;
            } else {
                statusText.className = 'fw-bold mb-3 text-primary small';
                statusText.innerText = taskData.message;
            }

            // 검사 완료 후 중복 리스트 렌더링 (ISBN 추가)
            if (taskData.status === 'done' && taskData.duplicates) {
                // 이미 렌더링된 테이블이 있는지 체크하여 껌뻑거림 방지
                if (!resultArea.innerHTML.includes('table-responsive')) {
                    if (taskData.duplicates.length > 0) {
                        // 유효한 ISBN만 추출하여 숨겨진 textarea에 저장 ('ISBN없음'은 제외)
                        const validIsbns = taskData.duplicates.map(d => d.isbn).filter(isbn => isbn !== 'ISBN없음');
                        
                        let rows = taskData.duplicates.map(dup => `
                            <tr>
                                <td class="fw-bold text-truncate" style="max-width: 150px;" title="${dup.name}">${dup.name}</td>
                                <td class="text-primary font-monospace fw-bold">${dup.isbn}</td>
                                <td class="text-danger font-monospace">${dup.duplicate_id}</td>
                            </tr>
                        `).join('');
                        
                        resultArea.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div class="alert alert-warning py-2 small mb-0 fw-bold text-dark w-100 me-2 border-0">
                                    <i class="bi bi-exclamation-triangle-fill text-danger me-1"></i>
                                    ${taskData.duplicates.length}개의 중복 상품 발견
                                </div>
                                <button class="btn btn-sm btn-dark fw-bold text-nowrap py-2" onclick="copyIsbns('${storeId}')">
                                    <i class="bi bi-clipboard me-1"></i>ISBN 복사
                                </button>
                                <textarea id="hidden_isbns_${storeId}" class="d-none">${validIsbns.join('\n')}</textarea>
                            </div>
                            <div class="table-responsive border rounded" style="max-height: 250px;">
                                <table class="table table-sm table-hover mb-0" style="font-size: 0.8rem;">
                                    <thead class="table-light" style="position: sticky; top: 0; z-index: 1;">
                                        <tr><th>중복 상품명</th><th>ISBN (관리코드)</th><th>중복 채널번호</th></tr>
                                    </thead>
                                    <tbody>${rows}</tbody>
                                </table>
                            </div>
                        `;
                    } else {
                        resultArea.innerHTML = `
                            <div class="alert alert-success py-3 text-center mb-0 border-0 fw-bold">
                                <i class="bi bi-check-circle-fill me-1"></i> 이 상점은 중복된 판매 상품이 없이 깨끗합니다!
                            </div>
                        `;
                    }
                }
            } else if (taskData.is_running) {
                resultArea.innerHTML = `
                    <div class="text-center py-4 text-muted border rounded bg-light">
                        <div class="spinner-border text-primary mb-2" role="status" style="width: 2rem; height: 2rem;"></div>
                        <p class="small mb-0 fw-bold">네이버 스토어에서 판매중인 데이터를 분석하고 있습니다...</p>
                    </div>
                `;
            }
        }
        
        btnStopAll.classList.toggle('d-none', !anyRunning);
        btnRefresh.classList.toggle('d-none', !anyTaskExists); // 작업이 하나라도 있으면 새로고침 표시
        submitBtn.disabled = anyRunning;
        submitBtn.innerHTML = anyRunning ? '<span class="spinner-border spinner-border-sm me-2"></span>백그라운드에서 검사 진행 중...' : '선택 상점 동시 중복 체크 시작';
        
        if (!anyRunning) stopPolling();
        else startPolling();
    }

    document.getElementById('checkForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const checkboxes = document.querySelectorAll('.store-checkbox:checked');
        if(checkboxes.length === 0) { alert('검사할 상점을 선택해주세요.'); return; }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>검사 요청 중...';

        try {
            const res = await fetch("{{ url_for('store.start_dup_task') }}", { method: 'POST', body: new FormData(e.target) });
            const result = await res.json();
            if (result.success) {
                startPolling(); 
                fetchStatus(true); // 요청 직후 즉시 1회 강제 갱신
            } else {
                alert(result.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '선택 상점 동시 중복 체크 시작';
            }
        } catch (err) {
            alert("서버 연결에 실패했습니다.");
            submitBtn.disabled = false;
        }
    });

    document.addEventListener("DOMContentLoaded", () => {
        fetchStatus(true);
    });
</script>
{% endblock %}
